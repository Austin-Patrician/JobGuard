services:
  jobguard:
    build: .
    container_name: jobguard
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: jobguard-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${PG_USER:-jobguard}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-jobguard123}
      POSTGRES_DB: ${PG_DB:-jobguard}
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-jobguard}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
