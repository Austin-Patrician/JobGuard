services:
  jobguard:
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-JobGuard}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    container_name: jobguard
    restart: unless-stopped
    ports:
      - "${APP_BIND_IP:-0.0.0.0}:${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-JobGuard}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}

  nginx:
    image: nginx:1.27-alpine
    container_name: jobguard-proxy
    restart: unless-stopped
    depends_on:
      - jobguard
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
    volumes:
      - ./.deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  postgres:
    image: postgres:16-alpine
    container_name: jobguard-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${PG_USER:-jobguard}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-jobguard123}
      POSTGRES_DB: ${PG_DB:-jobguard}
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-jobguard}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
